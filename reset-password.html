<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TileIQ Pro – Set New Password</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#1e293b;border-radius:16px;padding:32px 24px;max-width:400px;width:100%}
  .logo{font-size:22px;font-weight:800;color:#f59e0b;margin-bottom:4px}
  .sub{color:#64748b;font-size:13px;margin-bottom:28px}
  label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px}
  input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:12px 14px;font-size:15px;margin-bottom:16px;outline:none}
  input:focus{border-color:#f59e0b}
  .btn{width:100%;background:#f59e0b;color:#000;font-weight:800;padding:14px;border-radius:10px;font-size:16px;border:none;cursor:pointer;margin-top:4px}
  .btn:disabled{opacity:0.5;cursor:not-allowed}
  .msg{padding:12px;border-radius:8px;font-size:14px;margin-bottom:16px;display:none}
  .msg.err{background:#7f1d1d;color:#fca5a5;display:block}
  .msg.ok{background:#065f46;color:#6ee7b7;display:block;text-align:center}
  .open-app{display:none;width:100%;background:#334155;color:#e2e8f0;font-weight:700;padding:14px;border-radius:10px;font-size:15px;border:none;cursor:pointer;margin-top:10px;text-align:center;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">TileIQ Pro</div>
  <div class="sub">Set your new password</div>
  <div class="msg" id="msg"></div>
  <div id="form">
    <label>New Password</label>
    <input type="password" id="pw1" placeholder="Min. 6 characters" autocomplete="new-password">
    <label>Confirm Password</label>
    <input type="password" id="pw2" placeholder="Repeat new password" autocomplete="new-password">
    <button class="btn" id="btn" onclick="submit()">Set New Password</button>
  </div>
  <a class="open-app" id="open-app" href="tileiq://">← Open TileIQ Pro App</a>
</div>
<script>
  var SB_URL = "https://lzwmqabxpxuuznhbpewm.supabase.co";
  var SB_KEY = "sb_publishable_bbLOe7wwtEWJhRxXZEKuuQ_QANTrsyr";
  var TOKEN  = "";

  (function() {
    var hash = window.location.hash.slice(1);
    var p    = new URLSearchParams(hash);
    TOKEN    = p.get("access_token") || "";
    var type = p.get("type") || "";
    if (!TOKEN || type !== "recovery") {
      showErr("Invalid or expired link. Please request a new password reset from the app.");
      document.getElementById("form").style.display = "none";
    }
  })();

  function showErr(t) {
    var m = document.getElementById("msg");
    m.className = "msg err";
    m.textContent = t;
  }

  async function submit() {
    var pw1 = document.getElementById("pw1").value;
    var pw2 = document.getElementById("pw2").value;
    var btn = document.getElementById("btn");
    document.getElementById("msg").className = "msg";

    if (pw1.length < 6) { showErr("Password must be at least 6 characters."); return; }
    if (pw1 !== pw2)    { showErr("Passwords don't match."); return; }

    btn.disabled = true;
    btn.textContent = "Saving…";

    try {
      var res  = await fetch(SB_URL + "/auth/v1/user", {
        method:  "PUT",
        headers: { "Content-Type": "application/json", "apikey": SB_KEY, "Authorization": "Bearer " + TOKEN },
        body:    JSON.stringify({ password: pw1 })
      });
      var data = await res.json();
      if (!res.ok) throw new Error(data.message || data.error_description || "Update failed");

      document.getElementById("form").style.display  = "none";
      var m = document.getElementById("msg");
      m.className   = "msg ok";
      m.textContent = "✅ Password updated! Open the app and sign in with your new password.";
      document.getElementById("open-app").style.display = "block";
    } catch(e) {
      showErr("Error: " + e.message);
      btn.disabled    = false;
      btn.textContent = "Set New Password";
    }
  }
</script>
</body>
</html>
